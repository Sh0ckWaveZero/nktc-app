services:
  postgres:
    image: postgres:18-alpine
    container_name: ${BACKEND_DB_CONTAINER_NAME:-backend1-postgres}
    restart: always
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_HOST_AUTH_METHOD: trust
      TZ: Asia/Bangkok
    logging:
      options:
        max-size: 10m
        max-file: "3"
    env_file:
      - .env
    ports:
      - "${POSTGRES_PORT:-5434}:5432"
    healthcheck:
      test:
        [
          'CMD',
          'pg_isready',
          '-U',
          '${POSTGRES_USER}',
          '-d',
          '${POSTGRES_DB}'
        ]
      interval: 30s
      timeout: 20s
      retries: 3
    volumes:
      - postgres-data:/var/lib/postgresql
    networks:
      - nktc-network

  minio:
    image: pgsty/minio:latest
    container_name: ${MINIO_CONTAINER_NAME:-backend1-minio}
    restart: always
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD}
      MINIO_BROWSER_REDIRECT_URL: http://localhost:${MINIO_CONSOLE_PORT:-9011}
      MINIO_SERVER_URL: http://localhost:${MINIO_API_PORT:-9010}
      TZ: Asia/Bangkok
    logging:
      options:
        max-size: 10m
        max-file: "3"
    env_file:
      - .env
    command: server /data --console-address ":9001"
    ports:
      - "${MINIO_API_PORT:-9010}:9000"
      - "${MINIO_CONSOLE_PORT:-9011}:9001"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 30s
      timeout: 20s
      retries: 3
    volumes:
      - minio-data:/data
    networks:
      - nktc-network

  minio-init:
    image: minio/mc
    container_name: ${MINIO_INIT_CONTAINER_NAME:-backend1-minio-init}
    depends_on:
      minio:
        condition: service_healthy
    env_file:
      - .env
    volumes:
      - ./scripts/minio-init.sh:/scripts/minio-init.sh:ro
    entrypoint:
      - /bin/sh
      - -c
      - "tr -d '\\r' </scripts/minio-init.sh | /bin/sh"
    restart: on-failure
    networks:
      - nktc-network

  portainer:
    image: portainer/portainer-ce:latest
    container_name: ${PORTAINER_CONTAINER_NAME:-backend1-portainer}
    privileged: true
    profiles:
      - tools
    ports:
      - "${PORTAINER_PORT:-9100}:9000"
    volumes:
      - portainer-data:/data
      - /var/run/docker.sock:/var/run/docker.sock
    restart: unless-stopped
    environment:
      - TZ=Asia/Bangkok
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/api/system/status"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 120s
    networks:
      - nktc-network

volumes:
  postgres-data:
    name: ${POSTGRES_VOLUME_NAME:-backend1-postgres-data}
  minio-data:
    name: ${MINIO_VOLUME_NAME:-backend1-minio-data}
  portainer-data:
    name: ${PORTAINER_VOLUME_NAME:-backend1-portainer-data}

networks:
  nktc-network:
    name: ${DOCKER_NETWORK_NAME:-backend1-network}
    driver: bridge
