services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: ${BACKEND_APP_CONTAINER_NAME:-backend1}
    restart: unless-stopped
    env_file:
      - .env.prod
    environment:
      NODE_ENV: production
      TZ: Asia/Bangkok
    ports:
      - "${BACKEND_PORT:-3001}:3001"
    depends_on:
      postgres:
        condition: service_healthy
      minio:
        condition: service_healthy
    logging:
      options:
        max-size: 10m
        max-file: "3"
    networks:
      - nktc-network

  postgres:
    image: postgres:17-alpine
    container_name: ${BACKEND_DB_CONTAINER_NAME:-backend1-postgres}
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
      TZ: Asia/Bangkok
    env_file:
      - .env.prod
    ports:
      - "${POSTGRES_PORT:-5434}:5432"
    healthcheck:
      test: ["CMD", "pg_isready", "-U", "${POSTGRES_USER}", "-d", "${POSTGRES_DB}"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 30s
    volumes:
      - postgres-data:/var/lib/postgresql
    logging:
      options:
        max-size: 10m
        max-file: "3"
    networks:
      - nktc-network

  minio:
    image: pgsty/minio:latest
    container_name: ${MINIO_CONTAINER_NAME:-backend1-minio}
    restart: unless-stopped
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD}
      MINIO_BROWSER_REDIRECT_URL: http://localhost:${MINIO_CONSOLE_PORT:-9011}
      MINIO_SERVER_URL: http://localhost:${MINIO_API_PORT:-9010}
      TZ: Asia/Bangkok
    env_file:
      - .env.prod
    command: server /data --console-address ":9001"
    ports:
      - "${MINIO_API_PORT:-9010}:9000"
      - "${MINIO_CONSOLE_PORT:-9011}:9001"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 30s
    volumes:
      - minio-data:/data
    logging:
      options:
        max-size: 10m
        max-file: "3"
    networks:
      - nktc-network

  minio-init:
    image: minio/mc:latest
    container_name: ${MINIO_INIT_CONTAINER_NAME:-backend1-minio-init}
    depends_on:
      minio:
        condition: service_healthy
    env_file:
      - .env.prod
    volumes:
      - ./scripts/minio-init.sh:/scripts/minio-init.sh:ro
    entrypoint:
      - /bin/sh
      - -c
      - "tr -d '\\r' </scripts/minio-init.sh | /bin/sh"
    restart: on-failure
    networks:
      - nktc-network

volumes:
  postgres-data:
    name: ${POSTGRES_VOLUME_NAME:-backend1-postgres-data}
  minio-data:
    name: ${MINIO_VOLUME_NAME:-backend1-minio-data}

networks:
  nktc-network:
    name: ${DOCKER_NETWORK_NAME:-backend1-network}
    driver: bridge
